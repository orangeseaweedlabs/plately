<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Enable standalone app mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- App name -->
  <meta name="apple-mobile-web-app-title" content="Expense Tracker">
  <!-- Status bar style -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-180.png">

  <title>Plately — Home</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .hero{background:var(--dark);color:var(--bg);padding:20px 16px 24px;}
    .hero-date{font-size:.78rem;font-weight:500;opacity:.55;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
    .hero-title{font-family:'Archivo Black',sans-serif;font-size:1.5rem;line-height:1.1;}
    .hero-title span{color:var(--green);}

    .today-section{background:var(--dark);padding:0 16px 20px;}
    .today-grid{display:grid;gap:10px;}

    .today-meal-card{border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;cursor:pointer;}
    .today-meal-card.breakfast{background:var(--blue-light);}
    .today-meal-card.lunch    {background:var(--green-light);}
    .today-meal-card.dinner   {background:var(--pink-light);}
    .today-meal-card .meal-label{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;opacity:.7;}
    .today-meal-card.breakfast .meal-label{color:var(--blue-dark);}
    .today-meal-card.lunch     .meal-label{color:var(--green-dark);}
    .today-meal-card.dinner    .meal-label{color:var(--pink-dark);}
    .today-meal-card .meal-name{font-family:'Archivo Black',sans-serif;font-size:.95rem;line-height:1.25;}
    .today-meal-card.breakfast .meal-name{color:var(--blue-dark);}
    .today-meal-card.lunch     .meal-name{color:var(--green-dark);}
    .today-meal-card.dinner    .meal-name{color:var(--pink-dark);}
    .today-meal-card .meal-dishes{font-size:.75rem;margin-top:4px;opacity:.65;}
    .today-meal-card .meal-dot{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;opacity:.18;}
    .today-meal-card.breakfast .meal-dot{background:var(--blue);}
    .today-meal-card.lunch     .meal-dot{background:var(--green);}
    .today-meal-card.dinner    .meal-dot{background:var(--pink);}
    .today-meal-card.empty{opacity:.55;border:1.5px dashed rgba(48,42,44,.2);background:rgba(255,250,240,.06)!important;cursor:default;}
    .today-meal-card.empty .meal-name{opacity:.5;font-style:italic;font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:500;}

    .skel-today-card{border-radius:var(--r);padding:16px;background:rgba(255,250,240,.08);margin-bottom:10px;}

    .section-bg{background:var(--bg);border-radius:20px 20px 0 0;padding-top:20px;}
    .legend{display:flex;gap:14px;margin-bottom:16px;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:600;color:var(--dark-60);}
    .legend-dot{width:8px;height:8px;border-radius:50%;}
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="page-wrap">
  <div class="topbar">
    <span class="topbar-logo">meal<span>kit</span></span>
    <span id="user-avatar"></span>
    <button class="icon-btn light" onclick="window.location='meal-add.html'" title="Add Meal">＋</button>
  </div>
</div>

<!-- HERO -->
<div class="hero page-wrap">
  <p class="hero-date" id="today-date"></p>
  <h1 class="hero-title">Today's<br><span>Meals</span></h1>
</div>

<!-- TODAY MEAL CARDS -->
<div class="today-section page-wrap">
  <div class="today-grid" id="today-meals">
    <!-- skeleton while loading -->
    <div class="skel-today-card skeleton" style="height:72px;"></div>
    <div class="skel-today-card skeleton" style="height:72px;opacity:.7;"></div>
    <div class="skel-today-card skeleton" style="height:72px;opacity:.4;"></div>
  </div>
</div>

<!-- CALENDAR SECTION -->
<div class="section-bg">
  <div class="page-wrap">
    <div class="content">
      <div class="section-head">
        <h2>Meal Calendar</h2>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Breakfast</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Lunch</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div>Dinner</div>
      </div>
      <div class="calendar" id="calendar-widget">
        <div class="cal-header">
          <button class="cal-nav" id="prev-month">&#8249;</button>
          <span class="cal-month" id="cal-month-label"></span>
          <button class="cal-nav" id="next-month">&#8250;</button>
        </div>
        <div class="cal-grid" id="cal-grid">
          <div class="cal-dow">Su</div><div class="cal-dow">Mo</div><div class="cal-dow">Tu</div>
          <div class="cal-dow">We</div><div class="cal-dow">Th</div><div class="cal-dow">Fr</div>
          <div class="cal-dow">Sa</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
  renderNav('home');

  const now    = new Date();
  const TODAY  = now.toISOString().slice(0,10);
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  document.getElementById('today-date').textContent =
    now.toLocaleDateString('en-SG',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  function showToast(msg, isErr=false){
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast'+(isErr?' error':'');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2800);
  }

  // ── Build meal name from dishes ──────────────────────
  const DISH_ORDER = ['Protein','Carb','Greens','Others'];
  function buildMealName(dishes){
    const byType = {};
    (dishes||[]).forEach(d=>{
      const t = d.dishes?.dish_type || d.dish_type;
      const n = d.dishes?.dish_name || d.dish_name;
      if(!byType[t]) byType[t]=[];
      byType[t].push(n);
    });
    return DISH_ORDER.filter(t=>byType[t])
      .map(t=>byType[t].join(' & ')).join(' + ') || '—';
  }

  // ── Render today's meals ─────────────────────────────
  function renderTodayMeals(meals){
    const grid = document.getElementById('today-meals');
    grid.innerHTML = '';
    const TYPES = [
      { key:'Breakfast', icon:'☀️' },
      { key:'Lunch',     icon:'🌤' },
      { key:'Dinner',    icon:'🌙' },
    ];
    TYPES.forEach(({key,icon},i)=>{
      const meal = meals.find(m=>m.meal_type===key);
      const div  = document.createElement('div');
      div.className = `today-meal-card ${key.toLowerCase()} fade-up${i>0?' delay-'+i:''}`;
      if(meal){
        const name    = buildMealName(meal.meal_dishes||[]);
        const count   = (meal.meal_dishes||[]).length;
        div.innerHTML = `<div class="meal-dot"></div>
          <p class="meal-label">${icon} ${key}</p>
          <p class="meal-name">${name}</p>
          <p class="meal-dishes">${count} dish${count!==1?'es':''}</p>`;
        div.onclick = ()=> window.location = `meal-detail.html?id=${meal.id}`;
      } else {
        div.classList.add('empty');
        div.innerHTML = `<div class="meal-dot"></div>
          <p class="meal-label">${icon} ${key}</p>
          <p class="meal-name">No meal planned yet</p>`;
      }
      grid.appendChild(div);
    });
  }

  // ── Calendar state ───────────────────────────────────
  let calYear  = now.getFullYear();
  let calMonth = now.getMonth();
  let mealData = {};   // { 'YYYY-MM-DD': Set(['Breakfast','Lunch',...]) }

  function renderCalendar(){
    document.getElementById('cal-month-label').textContent = `${months[calMonth]} ${calYear}`;
    const grid = document.getElementById('cal-grid');
    while(grid.children.length>7) grid.removeChild(grid.lastChild);

    const firstDay    = new Date(calYear,calMonth,1).getDay();
    const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
    const prevDays    = new Date(calYear,calMonth,0).getDate();

    for(let i=firstDay-1;i>=0;i--){
      const d=document.createElement('div');
      d.className='cal-day other-month';
      d.innerHTML=`<span class="day-num">${prevDays-i}</span>`;
      grid.appendChild(d);
    }
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday=(ds===TODAY);
      const types=[...(mealData[ds]||[])];
      const cell=document.createElement('div');
      cell.className='cal-day'+(isToday?' today':'');
      cell.onclick=()=>window.location=`meals.html?date=${ds}`;
      const dots=types.map(t=>`<span class="dot dot-${t}"></span>`).join('');
      cell.innerHTML=`<span class="day-num">${d}</span><div class="day-dots">${dots}</div>`;
      grid.appendChild(cell);
    }
    const total=firstDay+daysInMonth;
    const rem=total%7===0?0:7-total%7;
    for(let d=1;d<=rem;d++){
      const c=document.createElement('div');
      c.className='cal-day other-month';
      c.innerHTML=`<span class="day-num">${d}</span>`;
      grid.appendChild(c);
    }
  }

  async function loadCalendarMonth(){
    const start=`${calYear}-${String(calMonth+1).padStart(2,'0')}-01`;
    const endD  = new Date(calYear,calMonth+1,0);
    const end   =`${calYear}-${String(calMonth+1).padStart(2,'0')}-${endD.getDate()}`;
    const {data,error} = await db.from('meals')
      .select('meal_date,meal_type')
      .gte('meal_date',start)
      .lte('meal_date',end);
    if(error){ showToast('Could not load calendar',true); return; }
    mealData={};
    (data||[]).forEach(m=>{
      if(!mealData[m.meal_date]) mealData[m.meal_date]=new Set();
      mealData[m.meal_date].add(m.meal_type);
    });
    renderCalendar();
  }

  document.getElementById('prev-month').onclick=()=>{
    calMonth--; if(calMonth<0){calMonth=11;calYear--;} loadCalendarMonth();
  };
  document.getElementById('next-month').onclick=()=>{
    calMonth++; if(calMonth>11){calMonth=0;calYear++;} loadCalendarMonth();
  };

  // ── Main ─────────────────────────────────────────────
  (async()=>{
    const user = await requireAuth();
    if(!user) return;
    renderAvatar(user);

    // Today's meals with dishes
    const {data:meals, error:mErr} = await db
      .from('meals')
      .select('id,meal_type,meal_dishes(dish_id,dishes(dish_name,dish_type))')
      .eq('meal_date',TODAY);
    if(mErr) showToast('Could not load today\'s meals',true);
    renderTodayMeals(meals||[]);

    // Calendar
    loadCalendarMonth();
  })();
</script>
</body>
</html>
