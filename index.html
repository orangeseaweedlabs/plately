<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MealKit — Home</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* ── Home-specific ── */
    .hero{
      background:var(--dark);
      color:var(--bg);
      padding:20px 16px 24px;
      margin-bottom:0;
    }
    .hero-date{font-size:.78rem;font-weight:500;opacity:.55;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
    .hero-title{font-family:'Archivo Black',sans-serif;font-size:1.5rem;line-height:1.1;}
    .hero-title span{color:var(--green);}

    .today-section{
      background:var(--dark);
      padding:0 16px 20px;
    }
    .today-grid{display:grid;grid-template-columns:1fr;gap:10px;}

    .today-meal-card{
      border-radius:var(--r);
      padding:14px 16px;
      position:relative;overflow:hidden;
    }
    .today-meal-card.breakfast{background:var(--blue-light);}
    .today-meal-card.lunch    {background:var(--green-light);}
    .today-meal-card.dinner   {background:var(--pink-light);}

    .today-meal-card .meal-label{
      font-size:.7rem;font-weight:700;letter-spacing:.06em;
      text-transform:uppercase;margin-bottom:4px;opacity:.7;
    }
    .today-meal-card.breakfast .meal-label{color:var(--blue-dark);}
    .today-meal-card.lunch     .meal-label{color:var(--green-dark);}
    .today-meal-card.dinner    .meal-label{color:var(--pink-dark);}

    .today-meal-card .meal-name{
      font-family:'Archivo Black',sans-serif;
      font-size:.95rem;line-height:1.25;
    }
    .today-meal-card.breakfast .meal-name{color:var(--blue-dark);}
    .today-meal-card.lunch     .meal-name{color:var(--green-dark);}
    .today-meal-card.dinner    .meal-name{color:var(--pink-dark);}

    .today-meal-card .meal-dishes{
      font-size:.75rem;margin-top:4px;opacity:.65;
    }

    .today-meal-card .meal-dot{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      width:32px;height:32px;border-radius:50%;opacity:.18;
    }
    .today-meal-card.breakfast .meal-dot{background:var(--blue);}
    .today-meal-card.lunch     .meal-dot{background:var(--green);}
    .today-meal-card.dinner    .meal-dot{background:var(--pink);}

    .today-meal-card.empty{
      opacity:.55;border:1.5px dashed rgba(48,42,44,.2);background:rgba(255,250,240,.06)!important;
    }
    .today-meal-card.empty .meal-name{opacity:.5;font-style:italic;font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:500;}

    .section-bg{background:var(--bg);border-radius:20px 20px 0 0;padding-top:20px;}

    .legend{display:flex;gap:14px;margin-bottom:16px;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:600;color:var(--dark-60);}
    .legend-dot{width:8px;height:8px;border-radius:50%;}
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="page-wrap">
  <div class="topbar">
    <span class="topbar-logo">meal<span>kit</span></span>
    <button class="icon-btn light" onclick="window.location='meal-add.html'" title="Add Meal">＋</button>
  </div>
</div>

<!-- HERO: today's date -->
<div class="hero page-wrap">
  <p class="hero-date" id="today-date">Loading…</p>
  <h1 class="hero-title">Today's<br><span>Meals</span></h1>
</div>

<!-- TODAY MEAL CARDS -->
<div class="today-section page-wrap">
  <div class="today-grid" id="today-meals">

    <!-- Breakfast card -->
    <div class="today-meal-card breakfast fade-up" onclick="window.location='meal-detail.html?id=1'">
      <div class="meal-dot"></div>
      <p class="meal-label">☀️ Breakfast</p>
      <p class="meal-name">Grilled Chicken + Steamed Rice + Stir-fried Spinach</p>
      <p class="meal-dishes">3 dishes</p>
    </div>

    <!-- Lunch card -->
    <div class="today-meal-card lunch fade-up delay-1" onclick="window.location='meal-detail.html?id=2'">
      <div class="meal-dot"></div>
      <p class="meal-label">🌤 Lunch</p>
      <p class="meal-name">Salmon Fillet + Udon Noodles</p>
      <p class="meal-dishes">2 dishes</p>
    </div>

    <!-- Dinner — no meal planned -->
    <div class="today-meal-card dinner empty fade-up delay-2">
      <div class="meal-dot"></div>
      <p class="meal-label">🌙 Dinner</p>
      <p class="meal-name">No meal planned yet</p>
    </div>

  </div>
</div>

<!-- CALENDAR SECTION -->
<div class="section-bg">
  <div class="page-wrap">
    <div class="content">

      <div class="section-head fade-up delay-3">
        <h2>Meal Calendar</h2>
      </div>

      <!-- Legend -->
      <div class="legend fade-up delay-3">
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Breakfast</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Lunch</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div>Dinner</div>
      </div>

      <!-- Calendar widget -->
      <div class="calendar fade-up delay-4" id="calendar-widget">
        <div class="cal-header">
          <button class="cal-nav" id="prev-month">&#8249;</button>
          <span class="cal-month" id="cal-month-label"></span>
          <button class="cal-nav" id="next-month">&#8250;</button>
        </div>
        <div class="cal-grid" id="cal-grid">
          <div class="cal-dow">Su</div>
          <div class="cal-dow">Mo</div>
          <div class="cal-dow">Tu</div>
          <div class="cal-dow">We</div>
          <div class="cal-dow">Th</div>
          <div class="cal-dow">Fr</div>
          <div class="cal-dow">Sa</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="window.location='index.html'">
    <span class="nav-icon">🏠</span>Home
  </button>
  <button class="nav-item" onclick="window.location='dishes.html'">
    <span class="nav-icon">🍽</span>Dishes
  </button>
  <button class="nav-item" onclick="window.location='meals.html'">
    <span class="nav-icon">📅</span>Meals
  </button>
  <button class="nav-item" onclick="window.location='groceries.html'">
    <span class="nav-icon">🛒</span>Groceries
  </button>
</nav>

<script>
  /* ── Date display ── */
  const now = new Date();
  const dateOpts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  document.getElementById('today-date').textContent = now.toLocaleDateString('en-SG', dateOpts);

  /* ── Sample meal data (dots) — replace with Supabase fetch ── */
  // Format: { 'YYYY-MM-DD': ['breakfast','lunch','dinner', ...] }
  const mealData = {
    [fmt(now)]: ['breakfast','lunch'],
    [fmt(offset(now,-1))]: ['breakfast','lunch','dinner'],
    [fmt(offset(now,-3))]: ['dinner'],
    [fmt(offset(now, 2))]: ['breakfast','dinner'],
    [fmt(offset(now, 4))]: ['lunch'],
    [fmt(offset(now, 5))]: ['breakfast','lunch','dinner'],
  };

  function fmt(d){ return d.toISOString().slice(0,10); }
  function offset(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }

  /* ── Calendar render ── */
  let calYear = now.getFullYear();
  let calMonth = now.getMonth();
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function renderCalendar(){
    const label = document.getElementById('cal-month-label');
    label.textContent = `${months[calMonth]} ${calYear}`;

    // remove old day cells (keep DOW headers = first 7 children)
    const grid = document.getElementById('cal-grid');
    while(grid.children.length > 7) grid.removeChild(grid.lastChild);

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const prevDays = new Date(calYear, calMonth, 0).getDate();

    // previous month filler
    for(let i=firstDay-1;i>=0;i--){
      const d=document.createElement('div');
      d.className='cal-day other-month';
      d.innerHTML=`<span class="day-num">${prevDays-i}</span>`;
      grid.appendChild(d);
    }
    // current month
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday=(d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear());
      const types=mealData[dateStr]||[];
      const cell=document.createElement('div');
      cell.className='cal-day'+(isToday?' today':'');
      cell.onclick=()=>window.location=`meals.html?date=${dateStr}`;
      let dotsHtml=types.map(t=>`<span class="dot dot-${t}"></span>`).join('');
      cell.innerHTML=`<span class="day-num">${d}</span><div class="day-dots">${dotsHtml}</div>`;
      grid.appendChild(cell);
    }
    // next month filler
    const total=firstDay+daysInMonth;
    const remainder=total%7===0?0:7-total%7;
    for(let d=1;d<=remainder;d++){
      const cell=document.createElement('div');
      cell.className='cal-day other-month';
      cell.innerHTML=`<span class="day-num">${d}</span>`;
      grid.appendChild(cell);
    }
  }

  renderCalendar();
  document.getElementById('prev-month').onclick=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
  document.getElementById('next-month').onclick=()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };
</script>
</body>
</html>
