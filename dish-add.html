<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MealKit — Add Dish</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .ingredient-group{margin-bottom:20px;}
    .group-title{font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dark-60);margin-bottom:10px;}
    .selected-count{font-size:.75rem;font-weight:600;color:var(--dark-60);margin-top:8px;}
    .selected-count span{color:var(--dark);font-weight:700;}
    .chips-loading{font-size:.8rem;color:var(--dark-60);padding:8px 0;}

    .add-ing-trigger{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 16px;border-radius:40px;
      font-size:.8rem;font-weight:700;
      border:2px dashed var(--border);
      background:transparent;color:var(--dark-60);
      cursor:pointer;transition:all .18s;margin-top:4px;
    }
    .add-ing-trigger:hover{border-color:var(--green-dark);color:var(--green-dark);background:var(--green-light);}

    .modal-overlay{
      position:fixed;inset:0;background:rgba(48,42,44,.55);z-index:500;
      display:flex;align-items:flex-end;justify-content:center;
      animation:mFadeIn .2s ease;
    }
    @keyframes mFadeIn{from{opacity:0;}to{opacity:1;}}
    .modal-sheet{
      background:var(--bg);border-radius:20px 20px 0 0;
      padding:24px 16px 40px;width:100%;max-width:var(--max-w);
      animation:mSlideUp .25s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes mSlideUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .modal-header h3{font-family:'Archivo Black',sans-serif;font-size:1.1rem;}
    .modal-close{
      background:var(--surface);border:none;width:32px;height:32px;border-radius:50%;
      font-size:1.1rem;color:var(--dark-60);cursor:pointer;
      display:flex;align-items:center;justify-content:center;line-height:1;transition:background .15s;
    }
    .modal-close:hover{background:var(--dark-20);}
    .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .type-option{
      display:flex;flex-direction:column;align-items:center;gap:4px;
      padding:10px 6px;border-radius:var(--r-sm);border:2px solid var(--border);
      background:#fff;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;
    }
    .type-option .type-emoji{font-size:1.3rem;line-height:1;}
    .type-option:hover{border-color:var(--dark-20);background:var(--surface);}
    .type-option.selected-type{border-color:var(--dark);background:var(--dark);color:var(--bg);}
    .tobuy-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 0;border-top:1.5px solid var(--border);margin-top:6px;
    }
    .tobuy-row .lbl{font-size:.85rem;font-weight:600;}
    .tobuy-row .sub{font-size:.73rem;color:var(--dark-60);margin-top:2px;}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="topbar">
    <button class="icon-btn" onclick="history.back()">&#8592;</button>
    <span class="topbar-title" id="page-title">Add Dish</span>
  </div>
</div>

<div class="page-wrap">
  <div class="content">

    <div class="form-group fade-up">
      <label class="form-label">Dish Name *</label>
      <input class="form-control" type="text" id="dish-name" placeholder="e.g. Grilled Salmon" required/>
    </div>

    <div class="flex gap-12 fade-up delay-1">
      <div class="form-group" style="flex:1">
        <label class="form-label">Cuisine</label>
        <select class="form-control" id="cuisine">
          <option value="">Select…</option>
          <option>Western</option><option>Italian</option>
          <option>Chinese</option><option>Japanese</option><option>Korean</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">Dish Type *</label>
        <select class="form-control" id="dish-type">
          <option value="">Select…</option>
          <option>Protein</option><option>Carb</option>
          <option>Greens</option><option>Others</option>
        </select>
      </div>
    </div>

    <div class="form-group fade-up delay-1">
      <label class="form-label">Recipe Link <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input class="form-control" type="url" id="recipe-ref" placeholder="https://…"/>
    </div>

    <div class="divider fade-up delay-2"></div>

    <div class="fade-up delay-2">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;">
        <p style="font-family:'Archivo Black',sans-serif;font-size:1rem;">Select Ingredients</p>
        <button class="add-ing-trigger" onclick="openAddIngModal()">＋ New Ingredient</button>
      </div>
      <p class="small muted mb-16">Tap chips to add ingredients to this dish</p>
      <div id="ingredient-chips-wrap">
        <p class="chips-loading">Loading ingredients…</p>
      </div>
      <p class="selected-count">Selected: <span id="sel-count">0</span> ingredient(s)</p>
    </div>

    <div style="padding-bottom:20px;margin-top:20px;" class="fade-up delay-3">
      <button class="btn btn-primary btn-block" id="save-btn" onclick="saveDish()">Save Dish</button>
    </div>

  </div>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast" id="toast"></div>

<!-- ── Add Ingredient Modal ── -->
<div class="modal-overlay" id="add-ing-modal" style="display:none;" onclick="closeOnOverlay(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>New Ingredient</h3>
      <button class="modal-close" onclick="closeAddIngModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Ingredient Name *</label>
      <input class="form-control" type="text" id="modal-ing-name"
        placeholder="e.g. Chicken Breast"
        onkeydown="if(event.key==='Enter') saveNewIngredient()"/>
    </div>
    <div class="form-group">
      <label class="form-label">Type *</label>
      <div class="type-grid">
        <button class="type-option" data-type="Meat"      onclick="selectType(this)"><span class="type-emoji">🥩</span>Meat</button>
        <button class="type-option" data-type="Vegetable" onclick="selectType(this)"><span class="type-emoji">🥦</span>Vegetable</button>
        <button class="type-option" data-type="Rice"      onclick="selectType(this)"><span class="type-emoji">🍚</span>Rice</button>
        <button class="type-option" data-type="Noodle"    onclick="selectType(this)"><span class="type-emoji">🍜</span>Noodle</button>
        <button class="type-option" data-type="Others"    onclick="selectType(this)"><span class="type-emoji">✨</span>Others</button>
      </div>
    </div>
    <div class="tobuy-row">
      <div>
        <p class="lbl">Add to Grocery List?</p>
        <p class="sub">Can be changed later from Ingredients</p>
      </div>
      <button class="toggle" id="modal-tobuy" onclick="this.classList.toggle('on')"></button>
    </div>
    <div style="margin-top:18px;">
      <button class="btn btn-primary btn-block" id="modal-save-btn" onclick="saveNewIngredient()">
        Add Ingredient
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
  renderNav('dishes');

  const params = new URLSearchParams(window.location.search);
  const dishId = params.get('id');
  const isEdit = params.get('edit') === '1';
  if (isEdit) document.getElementById('page-title').textContent = 'Edit Dish';

  const TYPE_COLOR = { Meat:'chip-orange', Vegetable:'chip-green', Rice:'chip-amber', Noodle:'chip-pink', Others:'chip-dark' };
  const TYPE_ICON  = { Meat:'🥩', Vegetable:'🥦', Rice:'🍚', Noodle:'🍜', Others:'✨' };
  const TYPE_ORDER = ['Meat','Vegetable','Rice','Noodle','Others'];

  const selected = new Set();
  let allIngredients  = [];
  let selectedModalType = '';

  // Hoisted to module scope — accessible by ALL functions including onclick handlers
  let currentUser = null;

  // ── Toast ─────────────────────────────────────────────────────
  function showToast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isErr ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Chip rendering ────────────────────────────────────────────
  function renderChips(ingredients, preselected = new Set()) {
    const wrap = document.getElementById('ingredient-chips-wrap');
    if (!ingredients.length) {
      wrap.innerHTML = '<p class="small muted">No ingredients yet. Use the button above to add one.</p>';
      return;
    }
    const groups = {};
    ingredients.forEach(i => {
      if (!groups[i.ingredient_type]) groups[i.ingredient_type] = [];
      groups[i.ingredient_type].push(i);
    });

    wrap.innerHTML = TYPE_ORDER.filter(t => groups[t]).map(t => `
      <div class="ingredient-group">
        <p class="group-title">${TYPE_ICON[t]} ${t}</p>
        <div class="chip-group">
          ${groups[t].map(ing => {
            const isSel = preselected.has(ing.id);
            if (isSel) selected.add(ing.id);
            return `<span class="chip ${TYPE_COLOR[t] || 'chip-dark'} ${isSel ? 'selected' : ''}"
              data-id="${ing.id}" data-type="${t}"
              onclick="toggleChip(this)">${ing.ingredient_name}</span>`;
          }).join('')}
        </div>
      </div>`).join('');

    document.getElementById('sel-count').textContent = selected.size;
  }

  function toggleChip(el) {
    const id = el.dataset.id;
    if (selected.has(id)) {
      selected.delete(id);
      el.classList.remove('selected');
    } else {
      selected.add(id);
      el.classList.add('selected');
    }
    document.getElementById('sel-count').textContent = selected.size;
  }

  // ── Modal ─────────────────────────────────────────────────────
  function openAddIngModal() {
    document.getElementById('modal-ing-name').value = '';
    document.getElementById('modal-tobuy').classList.remove('on');
    document.querySelectorAll('.type-option').forEach(b => b.classList.remove('selected-type'));
    selectedModalType = '';
    document.getElementById('add-ing-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('modal-ing-name').focus(), 80);
  }

  function closeAddIngModal() {
    document.getElementById('add-ing-modal').style.display = 'none';
  }

  function closeOnOverlay(e) {
    if (e.target === document.getElementById('add-ing-modal')) closeAddIngModal();
  }

  function selectType(btn) {
    document.querySelectorAll('.type-option').forEach(b => b.classList.remove('selected-type'));
    btn.classList.add('selected-type');
    selectedModalType = btn.dataset.type;
  }

  async function saveNewIngredient() {
    const name  = document.getElementById('modal-ing-name').value.trim();
    const toBuy = document.getElementById('modal-tobuy').classList.contains('on');

    if (!name)              { showToast('Please enter an ingredient name.', true); return; }
    if (!selectedModalType) { showToast('Please select a type.', true); return; }
    if (!currentUser)       { showToast('Not signed in — please refresh.', true); return; }

    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    const { data, error } = await db.from('ingredients')
      .insert({
        ingredient_name: name,
        ingredient_type: selectedModalType,
        to_buy:          toBuy,
        user_id:         currentUser.id    // ← satisfies RLS policy
      })
      .select('id, ingredient_name, ingredient_type')
      .single();

    btn.disabled = false; btn.textContent = 'Add Ingredient';

    if (error) { showToast('Error: ' + error.message, true); return; }

    // Append, re-sort, re-render — new ingredient is auto-selected
    allIngredients.push(data);
    allIngredients.sort((a, b) => a.ingredient_name.localeCompare(b.ingredient_name));
    selected.add(data.id);
    renderChips(allIngredients, selected);
    closeAddIngModal();
    showToast(`"${data.ingredient_name}" added & selected ✓`);
  }

  // ── Save dish ─────────────────────────────────────────────────
  async function saveDish() {
    const name      = document.getElementById('dish-name').value.trim();
    const cuisine   = document.getElementById('cuisine').value;
    const dishType  = document.getElementById('dish-type').value;
    const recipeRef = document.getElementById('recipe-ref').value.trim() || null;

    if (!name)          { showToast('Please enter a dish name.', true); return; }
    if (!dishType)      { showToast('Please select a dish type.', true); return; }
    if (!selected.size) { showToast('Please select at least one ingredient.', true); return; }
    if (!currentUser)   { showToast('Not signed in — please refresh.', true); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      let id = dishId;

      if (isEdit && dishId) {
        const { error: updErr } = await db.from('dishes')
          .update({ dish_name: name, cuisine, dish_type: dishType, recipe_ref: recipeRef })
          .eq('id', dishId);
        if (updErr) throw updErr;
        await db.from('dish_ingredients').delete().eq('dish_id', dishId);

      } else {
        const { data: newDish, error: insErr } = await db.from('dishes')
          .insert({
            dish_name:  name,
            cuisine,
            dish_type:  dishType,
            recipe_ref: recipeRef,
            user_id:    currentUser.id    // ← satisfies RLS policy
          })
          .select('id')
          .single();
        if (insErr) throw insErr;
        id = newDish.id;
      }

      // dish_ingredients uses dish RLS — no user_id column needed here
      const rows = [...selected].map(iid => ({ dish_id: id, ingredient_id: iid }));
      const { error: linkErr } = await db.from('dish_ingredients').insert(rows);
      if (linkErr) throw linkErr;

      window.location = `dish-detail.html?id=${id}`;

    } catch (err) {
      showToast('Error: ' + err.message, true);
      btn.disabled = false; btn.textContent = 'Save Dish';
    }
  }

  // ── Init ──────────────────────────────────────────────────────
  (async () => {
    const user = await requireAuth();
    if (!user) return;
    currentUser = user;   // ← assign to module-scoped variable

    const { data: ings, error: ingErr } = await db
      .from('ingredients')
      .select('id, ingredient_name, ingredient_type')
      .order('ingredient_name');
    if (ingErr) { showToast('Could not load ingredients', true); return; }
    allIngredients = ings || [];

    let preselected = new Set();

    if (isEdit && dishId) {
      const { data: dish, error: dErr } = await db
        .from('dishes')
        .select('dish_name, cuisine, dish_type, recipe_ref, dish_ingredients(ingredient_id)')
        .eq('id', dishId)
        .single();
      if (dErr || !dish) { showToast('Could not load dish', true); return; }

      document.getElementById('dish-name').value  = dish.dish_name;
      document.getElementById('cuisine').value    = dish.cuisine || '';
      document.getElementById('dish-type').value  = dish.dish_type;
      document.getElementById('recipe-ref').value = dish.recipe_ref || '';
      preselected = new Set((dish.dish_ingredients || []).map(r => r.ingredient_id));
    }

    renderChips(allIngredients, preselected);
  })();
</script>
</body>
</html>
