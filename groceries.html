<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MealKit — Groceries</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .grocery-header{background:var(--dark);color:var(--bg);padding:20px 16px 28px;}
    .grocery-header h1{font-size:1.55rem;margin-bottom:6px;}
    .grocery-header p{font-size:.85rem;opacity:.55;}
    .curve{background:var(--bg);border-radius:20px 20px 0 0;padding-top:20px;margin-top:-10px;}
    .grocery-count{font-family:'Archivo Black',sans-serif;font-size:1rem;display:flex;align-items:center;gap:8px;margin-bottom:16px;}
    .count-pill{background:var(--green);color:#fff;font-size:.78rem;padding:2px 10px;border-radius:20px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;}

    .group-header{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dark-60);margin:20px 0 8px;}
    .group-header:first-child{margin-top:0;}

    .grocery-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fff;border-bottom:1.5px solid var(--border);transition:opacity .2s;}
    .grocery-item:last-child{border-bottom:none;}
    .grocery-item.checked{opacity:.45;}
    .grocery-item.checked .item-name{text-decoration:line-through;}
    .item-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
    .item-name{font-weight:600;font-size:.9rem;flex:1;}

    .check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .18s;background:#fff;}
    .check-box.checked{background:var(--green);border-color:var(--green-dark);color:#fff;}

    .ing-link{font-size:.75rem;color:var(--blue);font-weight:600;flex-shrink:0;cursor:pointer;background:none;border:none;}
    .ing-link:hover{text-decoration:underline;}

    .action-bar{position:sticky;bottom:calc(var(--nav-h)+12px);padding:12px 16px;background:var(--bg);border-top:1.5px solid var(--border);max-width:var(--max-w);margin:0 auto;display:flex;gap:10px;}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="topbar">
    <span class="topbar-logo">meal<span>kit</span></span>
    <span class="topbar-title"></span>
    <span id="user-avatar"></span>
  </div>
</div>

<!-- Header -->
<div class="grocery-header page-wrap">
  <h1>Grocery List 🛒</h1>
  <p>Ingredients flagged "To Buy" across all your dishes</p>
</div>

<div class="curve">
  <div class="page-wrap">
    <div class="content">
      <div class="grocery-count">
        Remaining: <span class="count-pill" id="remaining-count">…</span>
      </div>

      <!-- Skeleton -->
      <div id="skeleton-list">
        <div class="list-block">
          <div class="skel-row"><div class="skeleton skel-circle" style="border-radius:8px;width:36px;height:36px;"></div><div style="flex:1"><div class="skeleton skel-line medium"></div></div></div>
          <div class="skel-row"><div class="skeleton skel-circle" style="border-radius:8px;width:36px;height:36px;"></div><div style="flex:1"><div class="skeleton skel-line short"></div></div></div>
        </div>
      </div>

      <div id="grocery-content" style="display:none;"></div>

      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-icon">🎉</div>
        <p>All done! Your grocery list is empty.<br/>Mark ingredients as <strong>To Buy</strong> from the Ingredients page.</p>
      </div>

      <div style="height:80px;"></div>
    </div>
  </div>
</div>

<!-- Sticky action bar -->
<div class="action-bar">
  <button class="btn btn-outline" style="flex:1" onclick="loadGroceries()">🔄 Refresh</button>
  <button class="btn btn-danger"  style="flex:1" onclick="clearAll()">🧹 Clear All</button>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
  renderNav('groceries');

  const TYPE_ICON = {Meat:'🥩',Vegetable:'🥦',Rice:'🍚',Noodle:'🍜',Others:'✨'};
  const TYPE_BG   = {Meat:'#fff0e8',Vegetable:'var(--green-light)',Rice:'#fffbdd',Noodle:'#fde8f5',Others:'var(--surface)'};

  let items = [];
  const checkedSet = new Set();

  function showToast(msg,isErr=false){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='toast'+(isErr?' error':'');
    t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
  }

  function updateCount(){
    const remaining = items.length - checkedSet.size;
    document.getElementById('remaining-count').textContent = remaining;
  }

  function toggleCheck(id){
    const itemEl = document.getElementById(`gi-${id}`);
    const cbEl   = document.getElementById(`cb-${id}`);
    if(checkedSet.has(id)){
      checkedSet.delete(id);
      itemEl.classList.remove('checked');
      cbEl.classList.remove('checked');
      cbEl.textContent='';
    } else {
      checkedSet.add(id);
      itemEl.classList.add('checked');
      cbEl.classList.add('checked');
      cbEl.textContent='✓';
    }
    updateCount();
  }

  function renderGroceries(data){
    document.getElementById('skeleton-list').style.display='none';
    const content = document.getElementById('grocery-content');
    const empty   = document.getElementById('empty-state');

    if(!data.length){ content.style.display='none'; empty.style.display=''; document.getElementById('remaining-count').textContent='0'; return; }
    empty.style.display='none'; content.style.display='';

    // group by ingredient_type
    const groups={};
    const order=['Meat','Vegetable','Rice','Noodle','Others'];
    data.forEach(i=>{ const t=i.ingredient_type; if(!groups[t]) groups[t]=[]; groups[t].push(i); });

    content.innerHTML = order.filter(t=>groups[t]).map(t=>`
      <p class="group-header">${TYPE_ICON[t]||'✨'} ${t}</p>
      <div class="list-block" style="margin-bottom:4px;">
        ${groups[t].map(i=>`
          <div class="grocery-item${checkedSet.has(i.id)?' checked':''}" id="gi-${i.id}">
            <div class="item-icon" style="background:${TYPE_BG[i.ingredient_type]||'var(--surface)'}">${TYPE_ICON[i.ingredient_type]||'🥗'}</div>
            <span class="item-name">${i.ingredient_name}</span>
            <button class="ing-link" onclick="window.location='ingredient-detail.html?id=${i.id}'">Detail</button>
            <button class="check-box${checkedSet.has(i.id)?' checked':''}" id="cb-${i.id}" onclick="toggleCheck('${i.id}')">${checkedSet.has(i.id)?'✓':''}</button>
          </div>`).join('')}
      </div>`).join('');

    updateCount();
  }

  async function loadGroceries(){
    checkedSet.clear();
    document.getElementById('skeleton-list').style.display='';
    document.getElementById('grocery-content').style.display='none';
    document.getElementById('empty-state').style.display='none';

    const {data,error} = await db
      .from('ingredients')
      .select('id,ingredient_name,ingredient_type')
      .eq('to_buy',true)
      .order('ingredient_type')
      .order('ingredient_name');

    if(error){ showToast('Could not load grocery list',true); document.getElementById('skeleton-list').style.display='none'; return; }
    items = data||[];
    renderGroceries(items);
  }

  async function clearAll(){
    if(!items.length){ showToast('Nothing to clear.'); return; }
    if(!confirm('Mark all items as purchased?\nThis sets "To Buy" to No for all listed ingredients.')) return;

    const ids = items.map(i=>i.id);
    // Supabase doesn't support .in() update in a single call directly in all clients,
    // so we iterate in a single RPC-like update using the in filter:
    const {error} = await db
      .from('ingredients')
      .update({to_buy:false})
      .in('id',ids);

    if(error){ showToast('Error: '+error.message,true); return; }
    showToast('Grocery list cleared!');
    items=[];
    checkedSet.clear();
    renderGroceries([]);
  }

  (async()=>{
    const user = await requireAuth();
    if(!user) return;
    renderAvatar(user);
    loadGroceries();
  })();
</script>
</body>
</html>
