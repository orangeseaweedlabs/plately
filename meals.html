<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Plately — Meals</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .filter-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1.5px solid var(--border);background:var(--bg);position:sticky;top:60px;z-index:90;}
    .filter-bar::-webkit-scrollbar{display:none;}
    .filter-chip{white-space:nowrap;padding:6px 16px;border-radius:30px;font-size:.78rem;font-weight:700;border:2px solid var(--border);background:#fff;color:var(--dark-60);cursor:pointer;transition:all .18s;flex-shrink:0;}
    .filter-chip.active{background:var(--dark);color:var(--bg);border-color:var(--dark);}
    .date-group-label{font-family:'Archivo Black',sans-serif;font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;color:var(--dark-60);margin:20px 0 8px;}
    .date-group-label:first-child{margin-top:0;}
    .meal-list-item{display:flex;align-items:center;background:#fff;border-bottom:1.5px solid var(--border);cursor:pointer;transition:background .15s;overflow:hidden;}
    .meal-list-item:hover{background:var(--surface);}
    .meal-list-item:last-child{border-bottom:none;}
    .meal-stripe{width:5px;flex-shrink:0;align-self:stretch;}
    .stripe-Breakfast{background:var(--breakfast);}
    .stripe-Lunch    {background:var(--lunch);}
    .stripe-Dinner   {background:var(--dinner);}
    .meal-list-body{flex:1;min-width:0;padding:13px 14px;}
    .meal-list-type{font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px;}
    .meal-list-type.Breakfast{color:var(--blue-dark);}
    .meal-list-type.Lunch    {color:var(--green-dark);}
    .meal-list-type.Dinner   {color:var(--pink-dark);}
    .meal-list-name{font-weight:600;font-size:.88rem;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .meal-list-count{font-size:.75rem;color:var(--dark-60);margin-top:2px;}
    .meal-arrow{padding-right:14px;color:var(--dark-60);font-size:.85rem;}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="topbar">
    <span class="topbar-logo">meal<span>kit</span></span>
    <span class="topbar-title"></span>
    <span id="user-avatar"></span>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter(this,'all')">All</button>
  <button class="filter-chip" onclick="setFilter(this,'Breakfast')">☀️ Breakfast</button>
  <button class="filter-chip" onclick="setFilter(this,'Lunch')">🌤 Lunch</button>
  <button class="filter-chip" onclick="setFilter(this,'Dinner')">🌙 Dinner</button>
</div>

<div class="page-wrap">
  <div class="content">
    <!-- Skeleton -->
    <div id="skeleton-list">
      <div class="skeleton skel-line short mb-12" style="height:12px;width:120px;"></div>
      <div class="list-block">
        <div class="skel-row"><div style="flex:1"><div class="skeleton skel-line short"></div><div class="skeleton skel-line medium mt-8"></div></div></div>
        <div class="skel-row"><div style="flex:1"><div class="skeleton skel-line short"></div><div class="skeleton skel-line medium mt-8"></div></div></div>
      </div>
    </div>

    <div id="meals-content" style="display:none;"></div>

    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">📅</div>
      <p>No meals planned yet.<br/>Tap <strong>+</strong> to log your first meal.</p>
    </div>
  </div>
</div>

<button class="fab" onclick="window.location='meal-add.html'">＋</button>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
  renderNav('meals');

  const TYPE_ICON  = {Breakfast:'☀️',Lunch:'🌤',Dinner:'🌙'};
  const DISH_ORDER = ['Protein','Carb','Greens','Others'];

  let allMeals = [];
  let activeFilter = 'all';

  function showToast(msg,isErr=false){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='toast'+(isErr?' error':'');
    t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
  }

  function buildMealName(mealDishes){
    const byType={};
    (mealDishes||[]).forEach(r=>{
      const d=r.dishes; if(!d) return;
      if(!byType[d.dish_type]) byType[d.dish_type]=[];
      byType[d.dish_type].push(d.dish_name);
    });
    return DISH_ORDER.filter(t=>byType[t]).map(t=>byType[t].join(' & ')).join(' + ')||'—';
  }

  function formatDate(dateStr){
    const d = new Date(dateStr+'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const yest  = new Date(today); yest.setDate(yest.getDate()-1);
    if(d.getTime()===today.getTime()) return 'Today';
    if(d.getTime()===yest.getTime())  return 'Yesterday';
    return d.toLocaleDateString('en-SG',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  }

  function setFilter(el,type){ document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); activeFilter=type; renderMeals(); }

  function renderMeals(){
    const filtered = allMeals.filter(m=> activeFilter==='all'||m.meal_type===activeFilter);
    const container= document.getElementById('meals-content');
    const empty    = document.getElementById('empty-state');

    if(!filtered.length){ container.style.display='none'; empty.style.display=''; return; }
    empty.style.display='none'; container.style.display='';

    // group by date
    const groups={};
    filtered.forEach(m=>{ if(!groups[m.meal_date]) groups[m.meal_date]=[]; groups[m.meal_date].push(m); });

    container.innerHTML = Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>`
      <p class="date-group-label">${formatDate(date)} · ${date}</p>
      <div class="list-block mb-16">
        ${groups[date].map(m=>{
          const name  = buildMealName(m.meal_dishes||[]);
          const count = (m.meal_dishes||[]).length;
          return `<div class="meal-list-item" onclick="window.location='meal-detail.html?id=${m.id}'">
            <div class="meal-stripe stripe-${m.meal_type}"></div>
            <div class="meal-list-body">
              <p class="meal-list-type ${m.meal_type}">${TYPE_ICON[m.meal_type]||''} ${m.meal_type}</p>
              <p class="meal-list-name">${name}</p>
              <p class="meal-list-count">${count} dish${count!==1?'es':''}</p>
            </div>
            <span class="meal-arrow">›</span>
          </div>`;
        }).join('')}
      </div>`).join('');
  }

  // Pre-filter from calendar link (?date=YYYY-MM-DD)
  const urlDate = new URLSearchParams(window.location.search).get('date');

  (async()=>{
    const user = await requireAuth();
    if(!user) return;
    renderAvatar(user);

    const query = db.from('meals')
      .select('id,meal_date,meal_type,meal_dishes(dish_id,dishes(dish_name,dish_type))')
      .order('meal_date',{ascending:false});
    if(urlDate) query.eq('meal_date',urlDate);

    const {data,error} = await query;
    document.getElementById('skeleton-list').style.display='none';
    if(error){ showToast('Could not load meals',true); return; }
    allMeals = data||[];
    renderMeals();
  })();
</script>
</body>
</html>
