<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MealKit — Dish Detail</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .dish-hero{
      background:var(--dark);
      color:var(--bg);
      padding:20px 16px 28px;
    }
    .dish-hero .meta{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
    .dish-hero h1{font-size:1.5rem;}
    .dish-hero .cuisine-tag{
      font-size:.72rem;font-weight:700;letter-spacing:.04em;
      text-transform:uppercase;opacity:.55;
    }

    .hero-curve{
      background:var(--bg);
      border-radius:20px 20px 0 0;
      padding-top:4px;
      margin-top:-8px;
    }

    .ingredient-section{margin-bottom:20px;}
    .ingredient-section-title{
      font-size:.72rem;font-weight:700;letter-spacing:.06em;
      text-transform:uppercase;color:var(--dark-60);
      margin-bottom:8px;
    }

    .ingredient-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 14px;
      background:#fff;
      border-bottom:1.5px solid var(--border);
    }
    .ingredient-row:first-of-type{border-radius:var(--r-sm) var(--r-sm) 0 0;}
    .ingredient-row:last-of-type{border-radius:0 0 var(--r-sm) var(--r-sm);border-bottom:none;}
    .ingredient-row:only-of-type{border-radius:var(--r-sm);}
    .ingredient-row .name{font-weight:600;font-size:.88rem;}
    .ingredient-row .ing-type{font-size:.73rem;padding:3px 9px;border-radius:20px;font-weight:600;}

    .action-row{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;
      margin-top:8px;
    }
    .action-row .btn{justify-content:center;}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="topbar">
    <button class="icon-btn" onclick="history.back()">&#8592;</button>
    <span class="topbar-title">Dish Detail</span>
    <button class="icon-btn light" onclick="editDish()" title="Edit">✏️</button>
  </div>
</div>

<!-- Hero -->
<div class="dish-hero page-wrap">
  <div class="meta">
    <span class="badge badge-protein" id="dish-type-badge">Protein</span>
    <span class="cuisine-tag" id="dish-cuisine">Japanese</span>
  </div>
  <h1 id="dish-name">Salmon Fillet</h1>
</div>

<!-- Content -->
<div class="hero-curve">
  <div class="page-wrap">
    <div class="content">

      <!-- Action buttons -->
      <div class="action-row fade-up">
        <button class="btn btn-outline" onclick="editIngredients()">✏️ Edit Ingredients</button>
        <button class="btn btn-outline" id="recipe-btn" onclick="viewRecipe()" disabled>📖 View Recipe</button>
      </div>

      <div class="divider"></div>

      <!-- Ingredients by category -->
      <div id="ingredients-container" class="fade-up delay-1">

        <!-- Meat -->
        <div class="ingredient-section">
          <p class="ingredient-section-title">🥩 Meat</p>
          <div class="list-block">
            <div class="ingredient-row">
              <span class="name">Salmon</span>
              <span class="ing-type type-meat">Meat</span>
            </div>
          </div>
        </div>

        <!-- Vegetable -->
        <div class="ingredient-section">
          <p class="ingredient-section-title">🥦 Vegetable</p>
          <div class="list-block">
            <div class="ingredient-row">
              <span class="name">Bok Choy</span>
              <span class="ing-type type-vegetable">Vegetable</span>
            </div>
            <div class="ingredient-row">
              <span class="name">Spring Onion</span>
              <span class="ing-type type-vegetable">Vegetable</span>
            </div>
          </div>
        </div>

        <!-- Others -->
        <div class="ingredient-section">
          <p class="ingredient-section-title">✨ Others</p>
          <div class="list-block">
            <div class="ingredient-row">
              <span class="name">Soy Sauce</span>
              <span class="ing-type type-others">Others</span>
            </div>
            <div class="ingredient-row">
              <span class="name">Sesame Oil</span>
              <span class="ing-type type-others">Others</span>
            </div>
          </div>
        </div>

      </div>

      <!-- No ingredients fallback -->
      <div class="empty-state" id="no-ingredients" style="display:none;">
        <div class="empty-icon">🥗</div>
        <p>No ingredients added yet.<br/>Tap <strong>Edit Ingredients</strong> to add some.</p>
      </div>

    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item" onclick="window.location='index.html'"><span class="nav-icon">🏠</span>Home</button>
  <button class="nav-item active" onclick="window.location='dishes.html'"><span class="nav-icon">🍽</span>Dishes</button>
  <button class="nav-item" onclick="window.location='meals.html'"><span class="nav-icon">📅</span>Meals</button>
  <button class="nav-item" onclick="window.location='groceries.html'"><span class="nav-icon">🛒</span>Groceries</button>
</nav>

<script>
  /* ── Load dish data from URL params ── */
  const params = new URLSearchParams(window.location.search);
  const dishId = params.get('id');

  /* Sample data — replace with Supabase fetch by dishId */
  const sampleDish = {
    id: dishId || 4,
    name: 'Salmon Fillet',
    cuisine: 'Japanese',
    dish_type: 'Protein',
    recipe_ref: 'https://example.com/salmon-recipe',
  };

  // Populate hero
  document.getElementById('dish-name').textContent = sampleDish.name;
  document.getElementById('dish-cuisine').textContent = sampleDish.cuisine;

  const badge = document.getElementById('dish-type-badge');
  const typeMap = { Protein:'badge-protein', Carb:'badge-carb', Greens:'badge-greens', Others:'badge-others' };
  badge.textContent = sampleDish.dish_type;
  badge.className = `badge ${typeMap[sampleDish.dish_type] || 'badge-others'}`;

  // Recipe button
  const recipeBtn = document.getElementById('recipe-btn');
  if(sampleDish.recipe_ref){
    recipeBtn.disabled = false;
    recipeBtn.style.opacity = '1';
  }

  function viewRecipe(){
    if(sampleDish.recipe_ref) window.open(sampleDish.recipe_ref, '_blank');
  }

  function editIngredients(){
    window.location = `dish-add.html?id=${sampleDish.id}&edit=1`;
  }

  function editDish(){
    window.location = `dish-add.html?id=${sampleDish.id}&edit=1`;
  }
</script>
</body>
</html>
