<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Plately — Ingredient Detail</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .ing-hero{background:var(--dark);color:var(--bg);padding:20px 16px 28px;display:flex;align-items:flex-end;gap:16px;}
    .ing-hero-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;background:rgba(255,250,240,.12);}
    .ing-hero-body h1{font-size:1.4rem;margin-bottom:6px;}
    .curve-bg{background:var(--bg);border-radius:20px 20px 0 0;padding-top:20px;margin-top:-10px;}
    .info-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1.5px solid var(--border);}
    .info-row:last-child{border-bottom:none;}
    .info-label{font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--dark-60);}
    .info-value{font-size:.9rem;font-weight:600;}
    .dish-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:40px;background:#fff;border:1.5px solid var(--border);font-size:.82rem;font-weight:600;margin:0 6px 8px 0;cursor:pointer;transition:background .15s;}
    .dish-pill:hover{background:var(--surface);}

    /* Edit modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(48,42,44,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
    .modal-sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:24px 16px 32px;width:100%;max-width:var(--max-w);}
    .modal-sheet h3{font-family:'Archivo Black',sans-serif;font-size:1.1rem;margin-bottom:16px;}
    .modal-close{float:right;background:none;border:none;font-size:1.4rem;color:var(--dark-60);cursor:pointer;line-height:1;}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="topbar">
    <button class="icon-btn" onclick="history.back()">&#8592;</button>
    <span class="topbar-title">Ingredient Detail</span>
    <button class="icon-btn light" onclick="openEditModal()">✏️</button>
  </div>
</div>

<!-- Hero skeleton -->
<div class="ing-hero page-wrap" id="ing-hero">
  <div class="ing-hero-icon"><div class="skeleton" style="width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.2);"></div></div>
  <div class="ing-hero-body">
    <div class="skeleton" style="width:150px;height:24px;border-radius:6px;background:rgba(255,255,255,.2);margin-bottom:8px;"></div>
    <div class="skeleton" style="width:80px;height:18px;border-radius:20px;background:rgba(255,255,255,.15);"></div>
  </div>
</div>

<div class="curve-bg">
  <div class="page-wrap">
    <div class="content">
      <div class="card fade-up" style="padding:4px 16px;">
        <div class="info-row">
          <span class="info-label">Type</span>
          <span class="info-value" id="info-type">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">On Grocery List</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <span id="tobuy-label" style="font-size:.85rem;font-weight:600;">—</span>
            <button class="toggle" id="tobuy-toggle" onclick="toggleToBuy()"></button>
          </div>
        </div>
      </div>

      <div class="mt-20 fade-up delay-1">
        <h2 style="font-size:.95rem;margin-bottom:10px;font-family:'Archivo Black',sans-serif;">Used in Dishes</h2>
        <div id="dishes-pills"><div class="skeleton skel-line medium" style="height:34px;border-radius:40px;width:140px;"></div></div>
      </div>

      <div style="margin-top:28px;padding-bottom:12px;" class="fade-up delay-2">
        <button class="btn btn-danger btn-block" onclick="deleteIngredient()">🗑 Delete Ingredient</button>
      </div>
    </div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast" id="toast"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" style="display:none;" onclick="closeModalOnBg(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeEditModal()">×</button>
    <h3>Edit Ingredient</h3>
    <div class="form-group">
      <label class="form-label">Name *</label>
      <input class="form-control" type="text" id="edit-name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Type *</label>
      <select class="form-control" id="edit-type">
        <option>Meat</option><option>Vegetable</option>
        <option>Rice</option><option>Noodle</option><option>Others</option>
      </select>
    </div>
    <button class="btn btn-primary btn-block" id="edit-save-btn" onclick="saveEdit()">Save Changes</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
  renderNav('ingredients');

  const params = new URLSearchParams(window.location.search);
  const ingId  = params.get('id');

  const TYPE_ICON  = {Meat:'🥩',Vegetable:'🥦',Rice:'🍚',Noodle:'🍜',Others:'✨'};
  const TYPE_CLASS = {Meat:'type-meat',Vegetable:'type-vegetable',Rice:'type-rice',Noodle:'type-noodle',Others:'type-others'};

  let ingredient = null;

  function showToast(msg,isErr=false){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='toast'+(isErr?' error':'');
    t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
  }

  function renderHero(i){
    document.getElementById('ing-hero').innerHTML=`
      <div class="ing-hero-icon">${TYPE_ICON[i.ingredient_type]||'🥗'}</div>
      <div class="ing-hero-body">
        <h1>${i.ingredient_name}</h1>
        <span class="badge ${TYPE_CLASS[i.ingredient_type]||'type-others'}">${i.ingredient_type}</span>
      </div>`;
    document.getElementById('info-type').textContent = i.ingredient_type;
    renderToBuy(i.to_buy);
  }

  function renderToBuy(val){
    const toggle = document.getElementById('tobuy-toggle');
    const label  = document.getElementById('tobuy-label');
    toggle.className = 'toggle'+(val?' on':'');
    label.textContent = val?'Yes':'No';
    label.style.color = val?'var(--green-dark)':'var(--dark-60)';
    ingredient.to_buy = val;
  }

  async function toggleToBuy(){
    const newVal = !ingredient.to_buy;
    const {error} = await db.from('ingredients').update({to_buy:newVal}).eq('id',ingId);
    if(error){ showToast('Update failed',true); return; }
    renderToBuy(newVal);
    showToast(newVal?'Added to grocery list':'Removed from grocery list');
  }

  function renderDishes(links){
    const pills = document.getElementById('dishes-pills');
    const dishes = (links||[]).map(l=>l.dishes).filter(Boolean);
    if(!dishes.length){ pills.innerHTML='<p class="small muted">Not used in any dish yet.</p>'; return; }
    pills.innerHTML = dishes.map(d=>`
      <span class="dish-pill" onclick="window.location='dish-detail.html?id=${d.id}'">
        🍴 ${d.dish_name}
      </span>`).join('');
  }

  function openEditModal(){
    document.getElementById('edit-name').value = ingredient.ingredient_name;
    document.getElementById('edit-type').value = ingredient.ingredient_type;
    document.getElementById('edit-modal').style.display='flex';
  }
  function closeEditModal(){ document.getElementById('edit-modal').style.display='none'; }
  function closeModalOnBg(e){ if(e.target===document.getElementById('edit-modal')) closeEditModal(); }

  async function saveEdit(){
    const name = document.getElementById('edit-name').value.trim();
    const type = document.getElementById('edit-type').value;
    if(!name){ showToast('Name required.',true); return; }
    const btn=document.getElementById('edit-save-btn');
    btn.disabled=true; btn.textContent='Saving…';

    const {error} = await db.from('ingredients')
      .update({ingredient_name:name, ingredient_type:type})
      .eq('id',ingId);

    if(error){ showToast('Error: '+error.message,true); btn.disabled=false; btn.textContent='Save Changes'; return; }

    ingredient.ingredient_name = name;
    ingredient.ingredient_type = type;
    renderHero(ingredient);
    closeEditModal();
    showToast('Updated!');
    btn.disabled=false; btn.textContent='Save Changes';
  }

  async function deleteIngredient(){
    if(!confirm(`Delete "${ingredient?.ingredient_name}"? This cannot be undone.`)) return;
    const {error} = await db.from('ingredients').delete().eq('id',ingId);
    if(error){ showToast('Delete failed: '+error.message,true); return; }
    window.location='ingredients.html';
  }

  (async()=>{
    const user = await requireAuth();
    if(!user) return;
    if(!ingId){ window.location='ingredients.html'; return; }

    const {data,error} = await db
      .from('ingredients')
      .select('id,ingredient_name,ingredient_type,to_buy,dish_ingredients(dish_id,dishes(id,dish_name))')
      .eq('id',ingId)
      .single();

    if(error||!data){ showToast('Could not load ingredient',true); return; }
    ingredient = data;
    renderHero(data);
    renderDishes(data.dish_ingredients||[]);
  })();
</script>
</body>
</html>
