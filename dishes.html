<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MealKit — Dishes</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .filter-bar{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;scrollbar-width:none;border-bottom:1.5px solid var(--border);background:var(--bg);position:sticky;top:60px;z-index:90;}
    .filter-bar::-webkit-scrollbar{display:none;}
    .filter-chip{white-space:nowrap;padding:6px 16px;border-radius:30px;font-size:.78rem;font-weight:700;border:2px solid var(--border);background:#fff;color:var(--dark-60);cursor:pointer;transition:all .18s;flex-shrink:0;}
    .filter-chip.active{background:var(--dark);color:var(--bg);border-color:var(--dark);}
    .filter-chip:hover:not(.active){background:var(--surface);}
    .dish-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
    .dish-icon.protein{background:#fff3e0;}
    .dish-icon.carb   {background:#fffbdd;}
    .dish-icon.greens {background:var(--green-light);}
    .dish-icon.others {background:var(--surface);}
    .cuisine-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;}
    .cuisine-Western  {background:#357af7;}
    .cuisine-Italian  {background:#e05a00;}
    .cuisine-Chinese  {background:#d42020;}
    .cuisine-Japanese {background:#5050e0;}
    .cuisine-Korean   {background:#c4407a;}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="topbar">
    <span class="topbar-logo">meal<span>kit</span></span>
    <span class="topbar-title"></span>
    <button class="icon-btn light" onclick="toggleSearch()" title="Search">🔍</button>
    <span id="user-avatar"></span>
  </div>
</div>

<!-- Search bar -->
<div class="page-wrap" id="search-bar" style="display:none;padding:8px 16px;background:var(--bg);border-bottom:1.5px solid var(--border);">
  <input class="form-control" type="text" placeholder="Search dishes…" id="search-input" oninput="applyFilter()"/>
</div>

<!-- Filter -->
<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter(this,'all')">All</button>
  <button class="filter-chip" onclick="setFilter(this,'Protein')">🥩 Protein</button>
  <button class="filter-chip" onclick="setFilter(this,'Carb')">🍚 Carb</button>
  <button class="filter-chip" onclick="setFilter(this,'Greens')">🥦 Greens</button>
  <button class="filter-chip" onclick="setFilter(this,'Others')">✨ Others</button>
</div>

<div class="page-wrap">
  <div class="content">
    <!-- Skeleton -->
    <div class="list-block" id="skeleton-list">
      <div class="skel-row"><div class="skeleton skel-circle"></div><div style="flex:1"><div class="skeleton skel-line medium"></div><div class="skeleton skel-line short mt-8"></div></div></div>
      <div class="skel-row"><div class="skeleton skel-circle"></div><div style="flex:1"><div class="skeleton skel-line medium"></div><div class="skeleton skel-line short mt-8"></div></div></div>
      <div class="skel-row"><div class="skeleton skel-circle"></div><div style="flex:1"><div class="skeleton skel-line medium"></div><div class="skeleton skel-line short mt-8"></div></div></div>
    </div>

    <div class="list-block fade-up" id="dishes-list" style="display:none;"></div>

    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">🍽️</div>
      <p>No dishes found.<br/>Tap <strong>+</strong> to add your first dish.</p>
    </div>
  </div>
</div>

<button class="fab" onclick="window.location='dish-add.html'" title="Add Dish">＋</button>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
  renderNav('dishes');

  const TYPE_ICON = {Protein:'🥩',Carb:'🍚',Greens:'🥦',Others:'✨'};
  const BADGE_CLS = {Protein:'badge-protein',Carb:'badge-carb',Greens:'badge-greens',Others:'badge-others'};

  let allDishes = [];
  let activeFilter = 'all';

  function showToast(msg,isErr=false){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='toast'+(isErr?' error':'');
    t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
  }

  function setFilter(el,type){
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    activeFilter=type;
    applyFilter();
  }

  function applyFilter(){
    const q=(document.getElementById('search-input')?.value||'').toLowerCase();
    const filtered=allDishes.filter(d=>{
      const typeOk = activeFilter==='all' || d.dish_type===activeFilter;
      const nameOk = !q || d.dish_name.toLowerCase().includes(q);
      return typeOk && nameOk;
    });
    renderList(filtered);
  }

  function renderList(dishes){
    const list=document.getElementById('dishes-list');
    const empty=document.getElementById('empty-state');
    if(!dishes.length){
      list.style.display='none'; empty.style.display=''; return;
    }
    empty.style.display='none'; list.style.display='';
    list.innerHTML=dishes.map(d=>`
      <div class="list-item" onclick="window.location='dish-detail.html?id=${d.id}'">
        <div class="dish-icon ${(d.dish_type||'').toLowerCase()}">${TYPE_ICON[d.dish_type]||'🍴'}</div>
        <div class="list-item-body">
          <div class="list-item-title">${d.dish_name}</div>
          <div class="list-item-sub">
            <span class="cuisine-dot cuisine-${d.cuisine||''}"></span>${d.cuisine||'—'} &bull;
            <span class="badge ${BADGE_CLS[d.dish_type]||'badge-others'}" style="font-size:.65rem;padding:2px 7px;">${d.dish_type}</span>
          </div>
        </div>
        <span class="list-item-arrow">›</span>
      </div>`).join('');
  }

  function toggleSearch(){
    const bar=document.getElementById('search-bar');
    bar.style.display=bar.style.display==='none'?'':'none';
    if(bar.style.display!=='none') document.getElementById('search-input').focus();
  }

  (async()=>{
    const user = await requireAuth();
    if(!user) return;
    renderAvatar(user);

    const {data,error} = await db
      .from('dishes')
      .select('id,dish_name,cuisine,dish_type')
      .order('dish_name');

    document.getElementById('skeleton-list').style.display='none';

    if(error){ showToast('Could not load dishes',true); return; }
    allDishes = data||[];
    applyFilter();
  })();
</script>
</body>
</html>
