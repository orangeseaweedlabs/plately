<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MealKit — Ingredients</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .filter-bar{
      display:flex;gap:8px;padding:10px 16px;
      overflow-x:auto;scrollbar-width:none;
      border-bottom:1.5px solid var(--border);
      background:var(--bg);position:sticky;top:60px;z-index:90;
    }
    .filter-bar::-webkit-scrollbar{display:none;}
    .filter-chip{
      white-space:nowrap;padding:6px 16px;border-radius:30px;
      font-size:.78rem;font-weight:700;
      border:2px solid var(--border);background:#fff;color:var(--dark-60);
      cursor:pointer;transition:all .18s;flex-shrink:0;
    }
    .filter-chip.active{background:var(--dark);color:var(--bg);border-color:var(--dark);}

    .ing-icon{
      width:40px;height:40px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;flex-shrink:0;
    }

    .to-buy-badge{
      font-size:.68rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
      padding:2px 8px;border-radius:20px;
      background:var(--green-light);color:var(--green-dark);
    }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="topbar">
    <span class="topbar-logo">meal<span>kit</span></span>
    <span class="topbar-title"></span>
    <button class="icon-btn light" onclick="toggleSearch()">🔍</button>
  </div>
</div>

<!-- Search bar -->
<div class="page-wrap" id="search-bar" style="display:none;padding:8px 16px;background:var(--bg);border-bottom:1.5px solid var(--border);">
  <input class="form-control" type="text" placeholder="Search ingredients…" id="search-input" oninput="filterList()"/>
</div>

<!-- Filter -->
<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter(this,'all')">All</button>
  <button class="filter-chip" onclick="setFilter(this,'Meat')">🥩 Meat</button>
  <button class="filter-chip" onclick="setFilter(this,'Vegetable')">🥦 Vegetable</button>
  <button class="filter-chip" onclick="setFilter(this,'Rice')">🍚 Rice</button>
  <button class="filter-chip" onclick="setFilter(this,'Noodle')">🍜 Noodle</button>
  <button class="filter-chip" onclick="setFilter(this,'Others')">✨ Others</button>
</div>

<div class="page-wrap">
  <div class="content">

    <div class="list-block fade-up" id="ing-list">

      <div class="list-item" data-type="Meat" data-name="Chicken Breast" onclick="window.location='ingredient-detail.html?id=1'">
        <div class="ing-icon" style="background:#fff0e8">🍗</div>
        <div class="list-item-body">
          <div class="list-item-title">Chicken Breast</div>
          <div class="list-item-sub"><span class="badge type-meat" style="font-size:.65rem;padding:2px 8px;">Meat</span></div>
        </div>
        <span class="to-buy-badge">To Buy</span>
        <span class="list-item-arrow" style="margin-left:8px">›</span>
      </div>

      <div class="list-item" data-type="Meat" data-name="Salmon" onclick="window.location='ingredient-detail.html?id=2'">
        <div class="ing-icon" style="background:#fff0e8">🐟</div>
        <div class="list-item-body">
          <div class="list-item-title">Salmon</div>
          <div class="list-item-sub"><span class="badge type-meat" style="font-size:.65rem;padding:2px 8px;">Meat</span></div>
        </div>
        <span class="list-item-arrow">›</span>
      </div>

      <div class="list-item" data-type="Vegetable" data-name="Spinach" onclick="window.location='ingredient-detail.html?id=3'">
        <div class="ing-icon" style="background:var(--green-light)">🥬</div>
        <div class="list-item-body">
          <div class="list-item-title">Spinach</div>
          <div class="list-item-sub"><span class="badge type-vegetable" style="font-size:.65rem;padding:2px 8px;">Vegetable</span></div>
        </div>
        <span class="to-buy-badge">To Buy</span>
        <span class="list-item-arrow" style="margin-left:8px">›</span>
      </div>

      <div class="list-item" data-type="Vegetable" data-name="Bok Choy" onclick="window.location='ingredient-detail.html?id=4'">
        <div class="ing-icon" style="background:var(--green-light)">🥦</div>
        <div class="list-item-body">
          <div class="list-item-title">Bok Choy</div>
          <div class="list-item-sub"><span class="badge type-vegetable" style="font-size:.65rem;padding:2px 8px;">Vegetable</span></div>
        </div>
        <span class="list-item-arrow">›</span>
      </div>

      <div class="list-item" data-type="Rice" data-name="White Rice" onclick="window.location='ingredient-detail.html?id=5'">
        <div class="ing-icon" style="background:#fffbdd">🍚</div>
        <div class="list-item-body">
          <div class="list-item-title">White Rice</div>
          <div class="list-item-sub"><span class="badge type-rice" style="font-size:.65rem;padding:2px 8px;">Rice</span></div>
        </div>
        <span class="list-item-arrow">›</span>
      </div>

      <div class="list-item" data-type="Noodle" data-name="Udon" onclick="window.location='ingredient-detail.html?id=6'">
        <div class="ing-icon" style="background:#fde8f5">🍜</div>
        <div class="list-item-body">
          <div class="list-item-title">Udon</div>
          <div class="list-item-sub"><span class="badge type-noodle" style="font-size:.65rem;padding:2px 8px;">Noodle</span></div>
        </div>
        <span class="to-buy-badge">To Buy</span>
        <span class="list-item-arrow" style="margin-left:8px">›</span>
      </div>

      <div class="list-item" data-type="Others" data-name="Soy Sauce" onclick="window.location='ingredient-detail.html?id=7'">
        <div class="ing-icon" style="background:var(--surface)">🫙</div>
        <div class="list-item-body">
          <div class="list-item-title">Soy Sauce</div>
          <div class="list-item-sub"><span class="badge type-others" style="font-size:.65rem;padding:2px 8px;">Others</span></div>
        </div>
        <span class="list-item-arrow">›</span>
      </div>

      <div class="list-item" data-type="Others" data-name="Sesame Oil" onclick="window.location='ingredient-detail.html?id=8'">
        <div class="ing-icon" style="background:var(--surface)">🧴</div>
        <div class="list-item-body">
          <div class="list-item-title">Sesame Oil</div>
          <div class="list-item-sub"><span class="badge type-others" style="font-size:.65rem;padding:2px 8px;">Others</span></div>
        </div>
        <span class="list-item-arrow">›</span>
      </div>

    </div>

    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">🥗</div>
      <p>No ingredients found.<br/>Tap <strong>+</strong> to add your first ingredient.</p>
    </div>

  </div>
</div>

<!-- FAB: Add ingredient -->
<button class="fab" onclick="addIngredient()">＋</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item" onclick="window.location='index.html'"><span class="nav-icon">🏠</span>Home</button>
  <button class="nav-item" onclick="window.location='dishes.html'"><span class="nav-icon">🍽</span>Dishes</button>
  <button class="nav-item" onclick="window.location='meals.html'"><span class="nav-icon">📅</span>Meals</button>
  <button class="nav-item" onclick="window.location='groceries.html'"><span class="nav-icon">🛒</span>Groceries</button>
</nav>

<script>
  let activeFilter = 'all';

  function setFilter(el, type){
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    activeFilter = type;
    filterList();
  }

  function filterList(){
    const query = (document.getElementById('search-input')?.value||'').toLowerCase();
    const items = document.querySelectorAll('#ing-list .list-item');
    let vis = 0;
    items.forEach(item=>{
      const typeMatch = activeFilter==='all'||item.dataset.type===activeFilter;
      const nameMatch = !query||item.dataset.name.toLowerCase().includes(query);
      const show = typeMatch&&nameMatch;
      item.style.display = show ? '':'none';
      if(show) vis++;
    });
    document.getElementById('empty-state').style.display = vis===0?'':'none';
    document.getElementById('ing-list').style.display = vis===0?'none':'';
  }

  function toggleSearch(){
    const bar = document.getElementById('search-bar');
    bar.style.display = bar.style.display==='none'?'':'none';
    if(bar.style.display!=='none') document.getElementById('search-input').focus();
  }

  function addIngredient(){
    const name = prompt('New ingredient name:');
    if(!name) return;
    /* TODO: INSERT into Supabase ingredients */
    alert(`"${name}" added! Connect to Supabase to persist.`);
  }
</script>
</body>
</html>
